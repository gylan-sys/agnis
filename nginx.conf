events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend/Unified container
    upstream app_server {
        server app:3000; # Points to the container named 'app'
    }

    server {
        listen 80;
        server_name localhost;

        # Gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # SECURITY: Handle API first to avoid SPA fallback
        location /api/ {
            proxy_pass http://app_server/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ensure errors from backend don't fallback to index.html
            proxy_intercept_errors on;
        }

        # STATIC FILES & SPA FALLBACK
        location / {
            proxy_pass http://app_server/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # This is the standard SPA fallback. 
            # In a unified container, Express handles this.
            # If serving static files via Nginx directly, use:
            # try_files $uri $uri/ /index.html;
        }
    }
}
